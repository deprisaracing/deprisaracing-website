<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>四房智能分配系统 | 实时抽签</title>
    <!-- Firebase SDK v8 -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <!-- canvas-confetti CDN -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: radial-gradient(circle at 20% 30%, #0a0f1e, #03060c);
            font-family: 'Segoe UI', system-ui, 'Microsoft YaHei', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1300px;
            width: 100%;
            background: rgba(12,20,30,0.75);
            backdrop-filter: blur(14px);
            border-radius: 48px;
            border: 1px solid rgba(0,255,255,0.35);
            padding: 30px 32px;
            color: #e2e8f0;
        }
        h1 { text-align: center; background: linear-gradient(135deg,#E0F2FE,#38BDF8,#818CF8); -webkit-background-clip: text; background-clip: text; color: transparent; margin-bottom: 8px; }
        .sub { text-align: center; color: #9ab3d4; margin-bottom: 25px; }
        .room-info { display: flex; flex-wrap: wrap; gap: 20px; margin: 30px 0; justify-content: center; }
        .room-card { flex:1; min-width: 180px; background: rgba(15,25,40,0.8); border-radius: 28px; padding: 18px; text-align: center; border-top: 4px solid; transition: 0.2s; }
        .room-1 { border-color: #3b82f6; } .room-2 { border-color: #10b981; } .room-3 { border-color: #f59e0b; } .room-4 { border-color: #a855f7; }
        .room-name { font-size: 1.5rem; font-weight: bold; margin-bottom: 8px; }
        .room-desc { font-size: 0.75rem; color: #a0b3d9; margin-bottom: 8px; }
        .room-occupancy { font-size: 1.6rem; font-weight: 800; margin: 8px 0; }
        .room-occupancy span { font-size: 1rem; font-weight: 400; color: #9ab3d4; }
        .progress-bar { width: 80%; height: 6px; background: #1e2a3a; border-radius: 6px; margin: 8px auto; overflow: hidden; }
        .progress-fill { height: 100%; width: 0%; background: linear-gradient(90deg,#38bdf8,#818cf8); transition: width 0.3s; }
        .input-section { background: rgba(0,0,0,0.45); backdrop-filter: blur(8px); border-radius: 36px; padding: 28px; margin: 32px 0; text-align: center; }
        input { background: #0f172ad9; border: 1.5px solid #3b4a6e; border-radius: 60px; padding: 14px 20px; width: 100%; max-width: 300px; color: white; text-align: center; font-size: 1rem; outline: none; transition: 0.2s; }
        input:focus { border-color: #38bdf8; box-shadow: 0 0 12px rgba(56,189,248,0.4); }
        button { background: linear-gradient(95deg,#0f2b3d,#0a1a2f); border: 1px solid #38bdf8; color: white; padding: 12px 36px; border-radius: 60px; font-weight: bold; cursor: pointer; transition: 0.2s; font-size: 1.1rem; }
        button:hover:not(:disabled) { transform: translateY(-3px); background: #1e3a5f; box-shadow: 0 8px 20px rgba(0,180,255,0.3); }
        button:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .status-message { margin-top: 20px; padding: 12px 20px; border-radius: 60px; background: rgba(0,0,0,0.6); display: inline-block; max-width: 90%; }
        .result-section { margin-top: 30px; }
        .result-table { width: 100%; border-collapse: separate; border-spacing: 0 10px; }
        .result-table th { background: #0f1a2bb3; backdrop-filter: blur(8px); padding: 14px; border-radius: 20px 20px 8px 8px; color: #cfe3ff; }
        .result-table td { background: rgba(20,30,45,0.8); padding: 14px; border-radius: 20px; backdrop-filter: blur(4px); }
        .my-result td { background: rgba(56,189,248,0.3); border: 1px solid #38bdf8; box-shadow: 0 0 8px #38bdf8; }
        .room-badge { display: inline-block; padding: 6px 18px; border-radius: 40px; font-weight: 700; background: #0f212e; }
        .badge-room1 { background: #2563eb; } .badge-room2 { background: #059669; } .badge-room3 { background: #d97706; } .badge-room4 { background: #9333ea; }
        .connection-info { text-align: center; margin-bottom: 15px; font-size: 0.85rem; display: flex; justify-content: center; align-items: center; gap: 8px; }
        .connected { color: #10b981; } .disconnected { color: #ef4444; }
        .curtain {
            position: fixed; top:0; left:0; width:100%; height:100%;
            background: radial-gradient(circle at center,#0b1120,#010101);
            z-index: 9999; display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            transition: opacity 1s ease, visibility 1s ease;
            cursor: pointer;
        }
        .curtain.hide { opacity: 0; visibility: hidden; pointer-events: none; }
        .curtain h2 { font-size: 3rem; background: linear-gradient(135deg,#c084fc,#38bdf8); -webkit-background-clip: text; background-clip: text; color: transparent; margin-bottom: 40px; }
        .curtain button { background: rgba(20,30,55,0.8); border: 2px solid #38bdf8; font-size: 1.8rem; padding: 16px 48px; border-radius: 80px; cursor: pointer; transition: 0.2s; }
        .curtain button:hover { transform: scale(1.05); background: rgba(56,189,248,0.2); box-shadow: 0 0 25px #38bdf8; }
        .draw-animation { position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%); background: #0f172ad9; backdrop-filter: blur(24px); border-radius: 60px; padding: 20px 32px; z-index: 10000; font-size: 2rem; font-weight: bold; color: #cffafe; border: 1px solid #38bdf8; white-space: nowrap; letter-spacing: 4px; animation: fadePop 0.4s ease; }
        @keyframes fadePop { 0% { opacity: 0; transform: translate(-50%,-50%) scale(0.8); } 100% { opacity: 1; transform: translate(-50%,-50%) scale(1); } }
        @media (max-width: 780px) { .container { padding: 20px; } .room-name { font-size: 1.2rem; } .curtain h2 { font-size: 2rem; } .curtain button { font-size: 1.3rem; padding: 12px 32px; } .draw-animation { font-size: 1.3rem; padding: 12px 20px; } }
    </style>
</head>
<body>
<div id="curtain" class="curtain">
    <div><h2>✦ 你准备好了吗 ✦</h2></div>
    <button id="revealBtn">揭 幕</button>
</div>
<div id="app" class="container" style="opacity:0; transition: opacity 0.8s;">
    <h1>⚡ 四维分配中枢 ⚡</h1>
    <div class="sub">实时同步 · 公平随机 · 科技抽签</div>
    <div class="connection-info"><span id="connStatus">🔌 连接中...</span></div>
    <div class="room-info" id="roomCards"></div>
    <div class="input-section">
        <h3 style="margin-bottom:15px;">🚀 登船 · 抽取舱位</h3>
        <input type="text" id="userName" placeholder="请输入您的姓名 (YL为房主)">
        <div style="margin-top:20px"><button id="assignBtn">✨ 随机抽签分配 ✨</button></div>
        <div id="statusMsg" class="status-message">✨ 输入姓名后点击抽签 ✨</div>
    </div>
    <div class="result-section">
        <h2>📡 实时住客表</h2>
        <table class="result-table"><thead><tr><th>👤 参与者</th><th>🛖 分配房间</th><th>👥 同房伙伴</th></tr></thead><tbody id="resultBody"></tbody></table>
    </div>
    <div class="footer" style="text-align:center; margin-top:25px; font-size:0.75rem; color:#7e8aa2;">🔮 每间房仅容2人 · 抽签后不可更改 · 数据实时同步 | 内定主人房已入住 YL</div>
</div>

<script>
    // 安全加载 canvas-confetti（如果 CDN 失败，定义空函数）
    if (typeof canvasConfetti === 'undefined') {
        window.canvasConfetti = function() { console.log("canvasConfetti fallback (no effect)"); };
    }
    const confetti = window.canvasConfetti;

    // Firebase 配置
    const firebaseConfig = {
        apiKey: "AIzaSyALyvLlsJVYdO_4O5o0dHDfXtT24LV0rF0",
        authDomain: "room-e2832.firebaseapp.com",
        databaseURL: "https://room-e2832-default-rtdb.asia-southeast1.firebasedatabase.app/",
        projectId: "room-e2832",
        storageBucket: "room-e2832.firebasestorage.app",
        messagingSenderId: "137478538786",
        appId: "1:137478538786:web:461298244e5a223f902c7b"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const ref = db.ref('assignments_final');

    // 房间定义
    const rooms = {
        room1: { name: '🏰 主人房', max: 2, badge: 'badge-room1' },
        room2: { name: '🎮 YL哥哥的房间', max: 2, badge: 'badge-room2' },
        room3: { name: '📚 YL的房间', max: 2, badge: 'badge-room3' },
        room4: { name: '🌿 客房', max: 2, badge: 'badge-room4' }
    };
    const roomKeys = ['room1','room2','room3','room4'];

    // 特殊名单（不区分大小写，自动匹配）
    const specialAliases = [
        'tee lek yun', 'ly', 'joshua', 'josh', 'js', 'ervin', 'tpy', '大帅哥'
    ];
    function isSpecialGuest(name) {
        const lower = name.toLowerCase().trim();
        return specialAliases.some(alias => lower === alias || lower.includes(alias) && alias.length >= 2);
    }

    let assignments = {};
    let currentUser = '';

    function renderRooms() {
        let counts = { room1:0, room2:0, room3:0, room4:0 };
        for (let name in assignments) {
            let r = assignments[name];
            if (counts[r] !== undefined) counts[r]++;
        }
        const container = document.getElementById('roomCards');
        if (!container) return;
        container.innerHTML = roomKeys.map(key => {
            const c = counts[key];
            const percent = (c / rooms[key].max) * 100;
            const roomNum = key.slice(-1);
            return `<div class="room-card room-${roomNum}">
                <div class="room-name">${rooms[key].name}</div>
                <div class="room-desc">${key === 'room1' ? '内定成员 YL' : ''}</div>
                <div class="room-occupancy">${c}<span> / ${rooms[key].max}</span></div>
                <div class="progress-bar"><div class="progress-fill" style="width:${percent}%"></div></div>
            </div>`;
        }).join('');
    }

    function renderTable() {
        const tbody = document.getElementById('resultBody');
        if (!tbody) return;
        if (Object.keys(assignments).length === 0) {
            tbody.innerHTML = '<td><td colspan="3" style="text-align:center;">✨ 等待星际访客 ✨</td></tr>';
            return;
        }
        let roomMembers = { room1:[], room2:[], room3:[], room4:[] };
        for (let name in assignments) roomMembers[assignments[name]].push(name);
        let html = '';
        for (let r of roomKeys) {
            const members = roomMembers[r];
            for (let p of members) {
                const roommates = members.filter(m => m !== p).join(', ') || '暂无';
                const isMe = (p === currentUser);
                const rowClass = isMe ? 'my-result' : '';
                const crown = (p === 'YL') ? ' 👑' : '';
                const youTag = isMe ? ' (您)' : '';
                html += `<tr class="${rowClass}">
                    <td>${escapeHtml(p)}${crown}${youTag}</td>
                    <td><span class="room-badge ${rooms[r].badge}">${rooms[r].name}</span></td>
                    <td>${escapeHtml(roommates)}</td>
                </tr>`;
            }
        }
        tbody.innerHTML = html;
    }

    function escapeHtml(str) { return str.replace(/[&<>]/g, function(m){if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }

    function refreshUI() {
        renderRooms();
        renderTable();
        const userName = document.getElementById('userName').value.trim();
        currentUser = userName;
        const assignBtn = document.getElementById('assignBtn');
        const statusDiv = document.getElementById('statusMsg');
        if (!assignBtn) return;
        if (userName && assignments[userName]) {
            assignBtn.disabled = true;
            statusDiv.innerText = `✅ 您已入住 ${rooms[assignments[userName]].name}，不可重复抽取`;
            return;
        }
        if (userName === 'YL') {
            assignBtn.disabled = true;
            statusDiv.innerText = `👑 YL 是主人房固定成员，无需抽签`;
            return;
        }
        let counts = { room1:0, room2:0, room3:0, room4:0 };
        for (let n in assignments) counts[assignments[n]]++;
        const allFull = roomKeys.every(k => counts[k] >= rooms[k].max);
        if (allFull) {
            assignBtn.disabled = true;
            statusDiv.innerText = `🏁 所有房间已满，分配结束`;
            return;
        }
        if (userName) {
            assignBtn.disabled = false;
            statusDiv.innerText = `✨ 点击抽签，随机分配房间 ✨`;
        } else {
            assignBtn.disabled = false;
            statusDiv.innerText = `请输入姓名后点击抽签`;
        }
    }

    function showDrawAnimation(finalRoomDisplay, callback) {
        let overlayDiv = document.createElement('div');
        overlayDiv.className = 'draw-animation';
        overlayDiv.innerText = '🎲 命运演算 🎲';
        document.body.appendChild(overlayDiv);
        let step = 0;
        const frames = ['⚡ 占卜星辰 ⚡', '🌀 排列组合 🌀', '✨ 结果揭晓 ✨', `🏠 ${finalRoomDisplay} 🏠`];
        let interval = setInterval(() => {
            if (step < frames.length-1) {
                overlayDiv.innerText = frames[step];
                step++;
            } else {
                clearInterval(interval);
                setTimeout(() => {
                    overlayDiv.innerText = frames[frames.length-1];
                    setTimeout(() => {
                        overlayDiv.remove();
                        if (callback) callback();
                    }, 1000);
                }, 200);
            }
        }, 400);
        try { confetti({ particleCount: 120, spread: 70, origin: { y: 0.6 }, colors: ['#38bdf8','#a855f7','#10b981'] }); } catch(e) {}
    }

    // 增强分配逻辑：特殊客人优先安排与YL同住（主人房）
    async function performAssign(userName) {
        if (!userName) throw new Error("姓名无效");
        if (userName === 'YL') throw new Error("YL不可抽签");
        if (assignments[userName]) throw new Error("您已经分配过房间");
        return new Promise((resolve, reject) => {
            ref.transaction((data) => {
                let cur = data || {};
                if (cur[userName]) return;
                let cnt = { room1:0, room2:0, room3:0, room4:0 };
                for (let p in cur) {
                    let r = cur[p];
                    if (cnt[r] !== undefined) cnt[r]++;
                }
                // 特殊客人彩蛋：如果主人房未满且用户名匹配特殊名单，则直接安排进主人房
                let assignedRoom = null;
                if (isSpecialGuest(userName) && cnt.room1 < rooms.room1.max) {
                    assignedRoom = 'room1';
                }
                if (!assignedRoom) {
                    let available = roomKeys.filter(k => cnt[k] < rooms[k].max);
                    if (available.length === 0) return;
                    assignedRoom = available[Math.floor(Math.random() * available.length)];
                }
                cur[userName] = assignedRoom;
                return cur;
            }, (error, committed, snapshot) => {
                if (error) reject(new Error("数据库错误: " + error.message));
                else if (!committed) reject(new Error("名额已被抢光，请重试"));
                else {
                    const roomKey = snapshot.val()[userName];
                    if (!roomKey) reject(new Error("分配失败"));
                    else resolve(roomKey);
                }
            });
        });
    }

    async function onAssignClick() {
        const userName = document.getElementById('userName').value.trim();
        if (!userName) { alert("请输入姓名"); return; }
        if (userName === 'YL') { alert("YL 是主人房固定成员，无需抽签"); return; }
        if (assignments[userName]) { alert("您已经分配过房间了"); document.getElementById('assignBtn').disabled = true; return; }
        const assignBtn = document.getElementById('assignBtn');
        assignBtn.disabled = true;
        const originalText = assignBtn.innerText;
        assignBtn.innerText = "🔮 抽签运算中...";
        try {
            const roomKey = await performAssign(userName);
            const roomDisplay = rooms[roomKey].name;
            showDrawAnimation(roomDisplay, () => {
                try { confetti({ particleCount: 200, spread: 100, origin: { y: 0.5 }, startVelocity: 15 }); } catch(e) {}
            });
            const statusDiv = document.getElementById('statusMsg');
            if (statusDiv) statusDiv.innerText = `✨ 抽签成功！您被分配到 ${roomDisplay} ✨`;
            assignBtn.disabled = true;
        } catch (err) {
            alert("分配失败: " + err.message);
            refreshUI();
        } finally {
            assignBtn.innerText = originalText;
        }
    }

    function startListening() {
        ref.on('value', (snapshot) => {
            assignments = snapshot.val() || {};
            if (!assignments['YL'] || assignments['YL'] !== 'room1') {
                ref.child('YL').set('room1');
                assignments['YL'] = 'room1';
            }
            refreshUI();
            const connSpan = document.getElementById('connStatus');
            if (connSpan) connSpan.innerHTML = '<span style="color:#10b981;">✅ 已连接实时数据库</span>';
        }, (error) => {
            console.error("监听错误:", error);
            const connSpan = document.getElementById('connStatus');
            if (connSpan) connSpan.innerHTML = '<span style="color:#ef4444;">❌ 连接失败，请检查数据库规则</span>';
        });
    }

    function initYL() {
        ref.child('YL').set('room1').catch(e => console.warn("YL初始化失败", e));
    }

    window.onload = () => {
        initYL();
        startListening();
        const assignBtn = document.getElementById('assignBtn');
        if (assignBtn) assignBtn.addEventListener('click', onAssignClick);
        const userNameInput = document.getElementById('userName');
        if (userNameInput) userNameInput.addEventListener('input', () => refreshUI());
        const curtain = document.getElementById('curtain');
        const revealBtn = document.getElementById('revealBtn');
        const appDiv = document.getElementById('app');
        function reveal() {
            if (curtain) curtain.classList.add('hide');
            if (appDiv) appDiv.style.opacity = '1';
            try { confetti({ particleCount: 80, spread: 50, origin: { y: 0.7 }, colors: ['#38bdf8'] }); } catch(e) {}
        }
        if (revealBtn) revealBtn.addEventListener('click', reveal);
        if (curtain) curtain.addEventListener('click', (e) => { if (e.target === curtain) reveal(); });
    };
</script>
</body>
</html>
