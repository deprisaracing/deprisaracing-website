<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>四房智能分配系统 | 实时抽签中枢</title>
    <!-- canvas-confetti 轻量彩带库 -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1"></script>
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Poppins', 'Inter', system-ui, -apple-system, 'Microsoft YaHei', sans-serif;
        }

        body {
            min-height: 100vh;
            background: radial-gradient(circle at 20% 30%, #0a0f1e, #03060c);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 24px;
            position: relative;
            overflow-x: auto;
        }

        /* 动态科技网格背景 */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(0, 255, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 255, 0.05) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: 0;
        }

        /* ---------- 开幕幕布样式 ---------- */
        .curtain {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, #0b1120, #010101);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 1s ease, visibility 1s ease;
            backdrop-filter: blur(2px);
            cursor: pointer;
        }
        .curtain.hide {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }
        .curtain-content {
            text-align: center;
            transform: scale(1);
            animation: gentlePulse 2s infinite ease-in-out;
        }
        .curtain h2 {
            font-size: 3.5rem;
            background: linear-gradient(135deg, #c084fc, #38bdf8, #2dd4bf);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: 4px;
            margin-bottom: 40px;
            text-shadow: 0 0 15px rgba(56,189,248,0.5);
        }
        .curtain button {
            background: rgba(20, 30, 55, 0.8);
            backdrop-filter: blur(12px);
            border: 2px solid #38bdf8;
            color: #e0f2fe;
            font-size: 1.8rem;
            font-weight: bold;
            padding: 16px 48px;
            border-radius: 80px;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 0 20px rgba(56,189,248,0.4);
            letter-spacing: 2px;
        }
        .curtain button:hover {
            transform: scale(1.05);
            background: rgba(56, 189, 248, 0.2);
            border-color: #7ac7ff;
            box-shadow: 0 0 35px #38bdf8;
        }
        @keyframes gentlePulse {
            0% { transform: scale(1); opacity: 0.9; }
            50% { transform: scale(1.02); opacity: 1; }
            100% { transform: scale(1); opacity: 0.9; }
        }

        /* 主容器原本样式增强 */
        .container {
            max-width: 1300px;
            width: 100%;
            background: rgba(12, 20, 30, 0.65);
            backdrop-filter: blur(14px);
            border-radius: 48px;
            border: 1px solid rgba(0, 255, 255, 0.25);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5), 0 0 20px rgba(0, 255, 255, 0.2);
            padding: 30px 32px;
            transition: all 0.3s ease;
            z-index: 2;
        }

        h1 {
            font-size: 2.5rem;
            background: linear-gradient(135deg, #E0F2FE, #38BDF8, #818CF8);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-align: center;
            letter-spacing: -0.5px;
        }

        .subtitle {
            text-align: center;
            color: #94a3b8;
            margin-bottom: 32px;
            font-weight: 400;
            border-bottom: 1px dashed rgba(56, 189, 248, 0.4);
            display: inline-block;
            width: auto;
            margin-left: auto;
            margin-right: auto;
            padding-bottom: 8px;
        }

        /* 房间卡片网格 */
        .room-info {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 40px;
            justify-content: center;
        }

        .room-card {
            flex: 1;
            min-width: 180px;
            background: rgba(15, 25, 40, 0.7);
            backdrop-filter: blur(8px);
            border-radius: 28px;
            padding: 18px 12px;
            text-align: center;
            border: 1px solid rgba(56, 189, 248, 0.3);
            transition: all 0.25s ease;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            position: relative;
            overflow: hidden;
        }
        .room-card::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(56,189,248,0.1) 0%, transparent 70%);
            opacity: 0;
            transition: opacity 0.5s;
        }
        .room-card:hover::after {
            opacity: 1;
        }
        .room-card.room-1 { border-top: 4px solid #3b82f6; }
        .room-card.room-2 { border-top: 4px solid #10b981; }
        .room-card.room-3 { border-top: 4px solid #f59e0b; }
        .room-card.room-4 { border-top: 4px solid #a855f7; }

        .room-name {
            font-size: 1.5rem;
            font-weight: 700;
            color: #e2e8f0;
            margin-bottom: 8px;
        }
        .room-desc {
            font-size: 0.75rem;
            color: #7e8aa2;
            margin-bottom: 12px;
        }
        .room-capacity {
            font-size: 0.9rem;
            color: #94a3b8;
            background: rgba(0,0,0,0.4);
            display: inline-block;
            padding: 4px 12px;
            border-radius: 40px;
        }
        .room-occupancy {
            font-size: 1.6rem;
            font-weight: 800;
            margin: 8px 0;
            color: #cbd5e6;
        }
        .room-occupancy span {
            font-size: 1rem;
            font-weight: 400;
            color: #5f7f9e;
        }
        .progress-bar {
            width: 80%;
            margin: 8px auto 0;
            height: 6px;
            background: #1e2a3a;
            border-radius: 6px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #38bdf8, #818cf8);
            border-radius: 6px;
            transition: width 0.3s ease;
        }

        .input-section {
            background: rgba(0, 0, 0, 0.35);
            backdrop-filter: blur(8px);
            border-radius: 36px;
            padding: 28px;
            margin: 32px 0;
            border: 1px solid rgba(56, 189, 248, 0.3);
            text-align: center;
        }

        .input-group {
            margin-bottom: 24px;
        }
        label {
            color: #cbd5e1;
            font-weight: 600;
            font-size: 1.1rem;
            display: block;
            margin-bottom: 12px;
        }
        input {
            width: 100%;
            max-width: 340px;
            padding: 14px 20px;
            background: #0f172ad9;
            border: 1.5px solid #2d3a5e;
            border-radius: 60px;
            font-size: 1rem;
            color: #f1f5f9;
            transition: all 0.2s;
            text-align: center;
            margin: 0 auto;
            display: block;
        }
        input:focus {
            outline: none;
            border-color: #38bdf8;
            box-shadow: 0 0 12px rgba(56, 189, 248, 0.4);
        }

        button {
            background: linear-gradient(95deg, #0f2b3d, #0a1a2f);
            border: 1px solid #38bdf8;
            color: #e0f2fe;
            padding: 12px 36px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 60px;
            cursor: pointer;
            transition: 0.2s;
            backdrop-filter: blur(5px);
            box-shadow: 0 4px 12px rgba(0, 160, 255, 0.2);
        }
        button:hover:not(:disabled) {
            transform: translateY(-3px);
            background: linear-gradient(95deg, #1e3a5f, #0b2b44);
            border-color: #7ac7ff;
            box-shadow: 0 8px 20px rgba(0, 180, 255, 0.4);
        }
        button:active {
            transform: translateY(1px);
        }
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            border-color: #4b5563;
        }

        .status-message {
            margin-top: 20px;
            padding: 12px;
            border-radius: 60px;
            font-weight: 600;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
            display: inline-block;
            width: auto;
            max-width: 90%;
        }

        .result-section {
            margin-top: 30px;
        }

        .result-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0 10px;
        }
        .result-table th {
            background: #0f1a2bb3;
            backdrop-filter: blur(8px);
            padding: 14px;
            color: #b9d0f0;
            font-weight: 600;
            border-radius: 20px 20px 8px 8px;
        }
        .result-table td {
            background: rgba(20, 30, 45, 0.7);
            padding: 14px;
            border-radius: 20px;
            backdrop-filter: blur(4px);
            color: #e2e8f0;
            transition: 0.1s;
        }
        .my-result td {
            background: rgba(56, 189, 248, 0.25);
            box-shadow: 0 0 8px #38bdf860;
            border: 1px solid #38bdf8;
        }
        .room-badge {
            display: inline-block;
            padding: 6px 18px;
            border-radius: 40px;
            font-weight: 700;
            background: #0f212e;
        }
        .badge-room1 { background: #2563eb; color: white; }
        .badge-room2 { background: #059669; color: white; }
        .badge-room3 { background: #d97706; color: white; }
        .badge-room4 { background: #9333ea; color: white; }

        .connection-info {
            text-align: center;
            margin-bottom: 12px;
            font-size: 0.8rem;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            color: #7e8aa2;
        }
        .connection-status {
            width: 10px;
            height: 10px;
            border-radius: 10px;
            display: inline-block;
        }
        .connected { background: #10b981; box-shadow: 0 0 6px #10b981; }
        .disconnected { background: #ef4444; }

        .footer {
            text-align: center;
            margin-top: 30px;
            font-size: 0.75rem;
            color: #5f7492;
        }

        /* 抽签动画特效 */
        .draw-animation {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #0f172ad9;
            backdrop-filter: blur(24px);
            border-radius: 60px;
            padding: 20px 32px;
            z-index: 1000;
            font-size: 2rem;
            font-weight: bold;
            color: #cffafe;
            border: 1px solid #38bdf8;
            box-shadow: 0 0 50px rgba(0,255,255,0.4);
            white-space: nowrap;
            font-family: monospace;
            letter-spacing: 4px;
            animation: fadePop 0.4s ease;
        }
        @keyframes fadePop {
            0% { opacity: 0; transform: translate(-50%, -50%) scale(0.8);}
            100% { opacity: 1; transform: translate(-50%, -50%) scale(1);}
        }
        @media (max-width: 780px) {
            .container { padding: 20px; }
            .room-name { font-size: 1.2rem; }
            .curtain h2 { font-size: 2rem; }
            .curtain button { font-size: 1.3rem; padding: 12px 32px; }
        }
    </style>
</head>
<body>

<!-- 开幕幕布：你准备好了吗 -->
<div id="curtainOverlay" class="curtain">
    <div class="curtain-content">
        <h2>✦ 你准备好了吗 ✦</h2>
        <button id="revealButton">揭 幕</button>
    </div>
</div>

<div class="container" id="mainApp" style="opacity:0; transition: opacity 0.8s ease;">
    <h1>⚡ 四维分配中枢 ⚡</h1>
    <div style="text-align: center"><span class="subtitle">实时同步 | 公平随机 | 科技抽签</span></div>
    
    <div class="connection-info">
        <span id="connectionStatus" class="connection-status disconnected"></span>
        <span id="connectionText">连接中枢系统...</span>
    </div>

    <!-- 四间房卡片，每间上限2人 -->
    <div class="room-info">
        <div class="room-card room-1">
            <div class="room-name">🏰 主人房</div>
            <div class="room-desc">尊享主卧 · 内定成员 YL</div>
            <div class="room-capacity">👥 上限 2 人</div>
            <div class="room-occupancy"><span id="room1-count">0</span><span> / 2</span></div>
            <div class="progress-bar"><div class="progress-fill" id="room1-progress"></div></div>
        </div>
        <div class="room-card room-2">
            <div class="room-name">🎮 我哥的房间</div>
            <div class="room-desc">极客电竞舱</div>
            <div class="room-capacity">👥 上限 2 人</div>
            <div class="room-occupancy"><span id="room2-count">0</span><span> / 2</span></div>
            <div class="progress-bar"><div class="progress-fill" id="room2-progress"></div></div>
        </div>
        <div class="room-card room-3">
            <div class="room-name">📚 我的房间</div>
            <div class="room-desc">静谧书阁</div>
            <div class="room-capacity">👥 上限 2 人</div>
            <div class="room-occupancy"><span id="room3-count">0</span><span> / 2</span></div>
            <div class="progress-bar"><div class="progress-fill" id="room3-progress"></div></div>
        </div>
        <div class="room-card room-4">
            <div class="room-name">🌿 客房</div>
            <div class="room-desc">雅致歇息处</div>
            <div class="room-capacity">👥 上限 2 人</div>
            <div class="room-occupancy"><span id="room4-count">0</span><span> / 2</span></div>
            <div class="progress-bar"><div class="progress-fill" id="room4-progress"></div></div>
        </div>
    </div>

    <div class="input-section">
        <h3 style="color:#b9e2ff; margin-bottom:10px;">🚀 登船 · 抽取舱位</h3>
        <div class="input-group">
            <label>🎭 请输入您的姓名</label>
            <input type="text" id="userName" placeholder="例: 星河, 旅人, 云帆 ... (YL为房主)">
        </div>
        <div class="button-section">
            <button id="assignButton">✨ 随机抽签分配 ✨</button>
        </div>
        <div id="statusMessage" class="status-message" style="margin: 16px auto 0; display: inline-block;">✨ 输入姓名，点击抽签，系统将实时分配 ✨</div>
    </div>

    <div class="result-section">
        <h2 style="color:#b9e2ff;">📡 实时住客表</h2>
        <table class="result-table">
            <thead>
                <tr><th>👤 参与者</th><th>🛖 分配房间</th><th>👥 同房伙伴</th></tr>
            </thead>
            <tbody id="resultTableBody"><tr><td colspan="3" style="text-align:center;">⏳ 等待中枢同步... </td></tr></tbody>
        </table>
    </div>
    <div class="footer">🔮 每间房仅容2人 · 抽签后不可更改 · 数据实时同步 | 内定主人房已入住 YL</div>
</div>

<script>
    // Firebase 配置
    const firebaseConfig = {
        apiKey: "AIzaSyALyvLlsJVYdO_4O5o0dHDfXtT24LV0rF0",
        authDomain: "room-e2832.firebaseapp.com",
        databaseURL: "https://room-e2832-default-rtdb.asia-southeast1.firebasedatabase.app/",
        projectId: "room-e2832",
        storageBucket: "room-e2832.firebasestorage.app",
        messagingSenderId: "137478538786",
        appId: "1:137478538786:web:461298244e5a223f902c7b"
    };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    const assignmentsRef = database.ref('assignments_v4'); // 全新路径，保证四房间结构干净

    // 四房间配置 (每间2人)
    const ROOM_KEYS = ['room1', 'room2', 'room3', 'room4'];
    const ROOM_MAP = {
        'room1': { display: '🏰 主人房', short: '主人房', max: 2, badge: 'badge-room1' },
        'room2': { display: '🎮 我哥的房间', short: '我哥的房间', max: 2, badge: 'badge-room2' },
        'room3': { display: '📚 我的房间', short: '我的房间', max: 2, badge: 'badge-room3' },
        'room4': { display: '🌿 客房', short: '客房', max: 2, badge: 'badge-room4' }
    };

    // DOM 元素
    const assignBtn = document.getElementById('assignButton');
    const userNameInput = document.getElementById('userName');
    const statusDiv = document.getElementById('statusMessage');
    const resultTbody = document.getElementById('resultTableBody');
    const connStatusSpan = document.getElementById('connectionStatus');
    const connTextSpan = document.getElementById('connectionText');
    const roomCounters = {
        room1: document.getElementById('room1-count'),
        room2: document.getElementById('room2-count'),
        room3: document.getElementById('room3-count'),
        room4: document.getElementById('room4-count')
    };
    const progressBars = {
        room1: document.getElementById('room1-progress'),
        room2: document.getElementById('room2-progress'),
        room3: document.getElementById('room3-progress'),
        room4: document.getElementById('room4-progress')
    };
    
    let currentAssignments = {};     // { 用户名: roomKey }
    let isUserAssigned = false;
    
    // 连接状态监听
    database.ref('.info/connected').on('value', (snap) => {
        if(snap.val()) {
            connStatusSpan.className = 'connection-status connected';
            connTextSpan.innerText = '✨ 已接入实时分配中枢 ✨';
        } else {
            connStatusSpan.className = 'connection-status disconnected';
            connTextSpan.innerText = '⚠️ 连接中断，检查网络';
        }
    });
    
    // 强制初始化：确保主人房内定YL (room1)
    async function enforceYL() {
        return new Promise((resolve) => {
            assignmentsRef.transaction((data) => {
                let fresh = data || {};
                let changed = false;
                // 确保YL存在且位于room1
                if(!fresh['YL'] || fresh['YL'] !== 'room1') {
                    fresh['YL'] = 'room1';
                    changed = true;
                }
                // 清理任何不属于ROOM_KEYS的脏数据，避免干扰计数
                for(let name in fresh) {
                    if(!ROOM_KEYS.includes(fresh[name])) {
                        delete fresh[name];
                        changed = true;
                    }
                }
                return changed ? fresh : undefined;
            }, (error, committed) => {
                if(error) console.warn("YL初始化异常", error);
                resolve();
            });
        });
    }
    
    // 更新房间计数 + 进度条 + 表格 (浪漫科技)
    function refreshUI() {
        let counts = { room1:0, room2:0, room3:0, room4:0 };
        for(let name in currentAssignments) {
            let r = currentAssignments[name];
            if(counts[r] !== undefined) counts[r]++;
        }
        // 更新显示数字与进度条
        for(let r of ROOM_KEYS) {
            let c = counts[r];
            let maxCap = ROOM_MAP[r].max;
            roomCounters[r].innerText = c;
            let percent = (c / maxCap) * 100;
            if(progressBars[r]) progressBars[r].style.width = `${percent}%`;
        }
        
        // 渲染表格 (含同伴)
        resultTbody.innerHTML = '';
        if(Object.keys(currentAssignments).length === 0) {
            resultTbody.innerHTML = '<tr><td colspan="3" style="text-align:center;">✨ 等待星际访客 ✨</td></tr>';
        } else {
            let roomMembers = { room1:[], room2:[], room3:[], room4:[] };
            for(let name in currentAssignments) {
                let r = currentAssignments[name];
                if(roomMembers[r]) roomMembers[r].push(name);
            }
            const currentUserName = userNameInput.value.trim();
            for(let r of ROOM_KEYS) {
                let members = roomMembers[r];
                for(let participant of members) {
                    let roommates = members.filter(m => m !== participant);
                    let roommatesStr = roommates.length ? roommates.join(', ') : '暂无室友';
                    let row = document.createElement('tr');
                    if(participant === currentUserName && participant !== "") {
                        row.classList.add('my-result');
                    }
                    let nameCell = document.createElement('td');
                    nameCell.innerText = participant;
                    if(participant === 'YL') {
                        let crown = document.createElement('span');
                        crown.innerText = ' 👑';
                        crown.style.color = '#facc15';
                        nameCell.appendChild(crown);
                    }
                    if(participant === currentUserName && participant !== "") {
                        let youSpan = document.createElement('span');
                        youSpan.innerText = ' (您)';
                        youSpan.style.color = '#38bdf8';
                        nameCell.appendChild(youSpan);
                    }
                    row.appendChild(nameCell);
                    
                    let roomCell = document.createElement('td');
                    let roomSpan = document.createElement('span');
                    roomSpan.className = `room-badge ${ROOM_MAP[r].badge}`;
                    roomSpan.innerText = ROOM_MAP[r].display;
                    roomCell.appendChild(roomSpan);
                    row.appendChild(roomCell);
                    
                    let mateCell = document.createElement('td');
                    mateCell.innerText = roommatesStr;
                    row.appendChild(mateCell);
                    resultTbody.appendChild(row);
                }
            }
        }
        
        // 动态控制抽签按钮及消息
        const curName = userNameInput.value.trim();
        const allFull = ROOM_KEYS.every(r => counts[r] >= ROOM_MAP[r].max);
        if(curName === 'YL') {
            assignBtn.disabled = true;
            updateStatusMessage("👑 YL 是主人房固定成员，无需抽签", "info");
        } 
        else if(curName && currentAssignments[curName]) {
            assignBtn.disabled = true;
            updateStatusMessage(`✅ 您已入住 ${ROOM_MAP[currentAssignments[curName]].display} ，不可重复抽取`, "info");
        }
        else if(allFull) {
            assignBtn.disabled = true;
            updateStatusMessage("🏁 所有房间均已满员，分配结束", "warning");
        }
        else if(curName) {
            assignBtn.disabled = false;
            updateStatusMessage("✨ 点击抽签，系统将为您随机分配房间 ✨", "success");
        }
        else {
            assignBtn.disabled = false;
            updateStatusMessage("请输入姓名后点击抽签", "info");
        }
    }
    
    function updateStatusMessage(msg, type) {
        statusDiv.innerText = msg;
        statusDiv.style.borderLeft = type === 'error' ? '4px solid #ef4444' : (type === 'warning' ? '4px solid #f59e0b' : '4px solid #38bdf8');
    }
    
    // 抽签动画 + 彩带
    function showDrawAnimation(finalRoomDisplay, callback) {
        let overlayDiv = document.createElement('div');
        overlayDiv.className = 'draw-animation';
        overlayDiv.innerText = '🎲 命运演算 🎲';
        document.body.appendChild(overlayDiv);
        let step = 0;
        const frames = ['⚡ 占卜星辰 ⚡', '🌀 排列组合 🌀', '✨ 结果揭晓 ✨', `🏠 ${finalRoomDisplay} 🏠`];
        let interval = setInterval(() => {
            if(step < frames.length-1) {
                overlayDiv.innerText = frames[step];
                step++;
            } else {
                clearInterval(interval);
                setTimeout(() => {
                    overlayDiv.innerText = frames[frames.length-1];
                    setTimeout(() => {
                        overlayDiv.remove();
                        if(callback) callback();
                    }, 1000);
                }, 200);
            }
        }, 400);
        canvasConfetti({ particleCount: 120, spread: 70, origin: { y: 0.6 }, colors: ['#38bdf8', '#a855f7', '#10b981'] });
    }
    
    // 事务分配 (随机可选房间 且 保证不超额)
    async function performAssign(userName) {
        if(!userName) throw new Error("姓名无效");
        if(userName === 'YL') throw new Error("YL不可抽签");
        if(currentAssignments[userName]) throw new Error("您已经分配过房间");
        // 快速全局满房检查 (基于最新currentAssignments，但事务中会二次保障)
        let cntNow = { room1:0, room2:0, room3:0, room4:0 };
        for(let p in currentAssignments) cntNow[currentAssignments[p]]++;
        let allFullNow = ROOM_KEYS.every(r => cntNow[r] >= ROOM_MAP[r].max);
        if(allFullNow) throw new Error("所有房间已满");
        
        return new Promise((resolve, reject) => {
            assignmentsRef.transaction((data) => {
                let assign = data || {};
                if(assign[userName]) return; // 已被别人抢注或已存在
                let roomCnt = { room1:0, room2:0, room3:0, room4:0 };
                for(let p in assign) {
                    let r = assign[p];
                    if(roomCnt[r] !== undefined) roomCnt[r]++;
                }
                let available = ROOM_KEYS.filter(r => roomCnt[r] < ROOM_MAP[r].max);
                if(available.length === 0) return; // 满房事务终止
                const chosen = available[Math.floor(Math.random() * available.length)];
                assign[userName] = chosen;
                return assign;
            }, (error, committed, snapshot) => {
                if(error) reject(new Error("数据库错误"));
                else if(!committed) reject(new Error("分配名额已被抢光，请重试"));
                else {
                    const newData = snapshot.val();
                    const assignedRoom = newData[userName];
                    if(!assignedRoom) reject(new Error("分配异常，未获得房间"));
                    else resolve(assignedRoom);
                }
            });
        });
    }
    
    async function onAssign() {
        let userName = userNameInput.value.trim();
        if(!userName) {
            updateStatusMessage("请输入您的姓名", "error");
            return;
        }
        if(userName === 'YL') {
            updateStatusMessage("YL 是主人房永久住客，不可抽签", "error");
            return;
        }
        if(currentAssignments[userName]) {
            updateStatusMessage(`您已入住 ${ROOM_MAP[currentAssignments[userName]].display}`, "error");
            assignBtn.disabled = true;
            return;
        }
        // 满员预检
        let cntCur = { room1:0, room2:0, room3:0, room4:0 };
        for(let p in currentAssignments) cntCur[currentAssignments[p]]++;
        if(ROOM_KEYS.every(r => cntCur[r] >= ROOM_MAP[r].max)) {
            updateStatusMessage("所有房间均已满员", "warning");
            assignBtn.disabled = true;
            return;
        }
        assignBtn.disabled = true;
        const originalText = assignBtn.innerText;
        assignBtn.innerText = "🔮 抽签运算中...";
        try {
            const assignedRoomKey = await performAssign(userName);
            const roomDisplay = ROOM_MAP[assignedRoomKey].display;
            showDrawAnimation(roomDisplay, () => {
                canvasConfetti({ particleCount: 200, spread: 100, origin: { y: 0.5 }, startVelocity: 15 });
            });
            updateStatusMessage(`✨ 抽签成功！您被分配到 ${roomDisplay} ✨`, "success");
            assignBtn.disabled = true;
        } catch(err) {
            let msg = err.message;
            if(msg.includes("已满")) updateStatusMessage("❌ 名额在最后一刻被抢光，请刷新后重试", "error");
            else if(msg.includes("已经分配")) updateStatusMessage("❌ 您已经分配过房间", "error");
            else updateStatusMessage(`分配失败: ${msg}`, "error");
            // 若满员再次禁用按钮
            let afterCnt = { room1:0, room2:0, room3:0, room4:0 };
            for(let p in currentAssignments) afterCnt[currentAssignments[p]]++;
            if(ROOM_KEYS.every(r => afterCnt[r] >= ROOM_MAP[r].max)) assignBtn.disabled = true;
            else assignBtn.disabled = false;
        } finally {
            assignBtn.innerText = originalText;
        }
    }
    
    // 监听数据库实时变化
    function startRealtimeSync() {
        assignmentsRef.on('value', (snapshot) => {
            let data = snapshot.val() || {};
            // 后置保障：如果缺少YL，再次强制补充（防止被误删）
            if(!data['YL'] || data['YL'] !== 'room1') {
                assignmentsRef.child('YL').set('room1');
                data['YL'] = 'room1';
            }
            currentAssignments = data;
            refreshUI();
        });
    }
    
    // 监听输入框变化更新高亮
    userNameInput.addEventListener('input', () => {
        refreshUI();
    });
    
    assignBtn.addEventListener('click', onAssign);
    
    // 开幕幕布逻辑 + 加载系统
    const curtain = document.getElementById('curtainOverlay');
    const mainApp = document.getElementById('mainApp');
    const revealBtn = document.getElementById('revealButton');
    
    function revealAndStart() {
        curtain.classList.add('hide');
        mainApp.style.opacity = '1';
        // 播放一小点彩蛋效果
        canvasConfetti({ particleCount: 80, spread: 50, origin: { y: 0.7 }, colors: ['#38bdf8'] });
        // 开始初始化Firebase数据
        enforceYL().then(() => {
            startRealtimeSync();
        }).catch(e => console.warn);
    }
    revealBtn.addEventListener('click', revealAndStart);
    // 也可以点击幕布任意位置揭幕，增强体验，但不干扰按钮
    curtain.addEventListener('click', (e) => {
        if(e.target === curtain || e.target.classList.contains('curtain')) revealAndStart();
    });
    // 确保容器初始不可见但已就绪
    mainApp.style.opacity = '0';
    // 预连接数据库不影响揭幕，只是提前初始化（无副作用）
    enforceYL(); 
</script>
</body>
</html>
